    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --blue: #0d2a4a; --red: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Lateef', cursive; background: var(--bg); margin: 0; padding: 0; font-size: 20px; color: #333; overflow-x: hidden; }

        /* هيڊر اسٽائل */
        .header { background: var(--blue); padding: 40px 15px 75px; text-align: center; color: white; position: relative; }
        .logo-container { width: 95px; height: 95px; background: white; border-radius: 50%; margin: 0 auto 10px; padding: 5px; border: 3px solid var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .logo-container img { width: 100%; border-radius: 50%; height: 100%; object-fit: cover; }
        .header h2 { margin: 10px 0 0; font-size: 30px; font-weight: normal; }

        .search-icon { position: absolute; left: 20px; top: 45px; font-size: 22px; cursor: pointer; opacity: 0.8; }
        .menu-icon { position: absolute; right: 20px; top: 45px; font-size: 24px; cursor: pointer; z-index: 2001; }

        /* ٿري ڊاٽ مينيو */
        #dropdown-menu { display: none; position: absolute; right: 20px; top: 85px; background: white; color: black; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); width: 170px; z-index: 2000; text-align: right; border: 1px solid #eee; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(-10px);} to {opacity: 1; transform: translateY(0);} }
        #dropdown-menu a { display: block; padding: 12px 15px; text-decoration: none; color: #333; border-bottom: 1px solid #f4f4f4; font-size: 19px; }
        #dropdown-menu a:hover { background: #f8f8f8; color: var(--red); }

        /* مينيو ڪارڊز گريڊ */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 15px; margin-top: -45px; position: relative; z-index: 10; }
        .menu-item { background: white; border-radius: 15px; padding: 25px 5px; text-align: center; text-decoration: none; color: var(--blue); box-shadow: 0 8px 20px rgba(0,0,0,0.06); transition: 0.3s; }
        .menu-item i { font-size: 32px; color: var(--red); margin-bottom: 12px; display: block; }
        .menu-item span { font-weight: bold; font-size: 22px; }
        .menu-item:active { transform: scale(0.95); }

        /* پڌرائيون سيڪشن */
        .section-header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .section-header h3 { border-right: 5px solid var(--red); padding-right: 12px; font-size: 26px; color: var(--blue); margin: 0; }
        .see-all { color: var(--red); text-decoration: none; font-size: 18px; font-weight: bold; }

        .news-container { padding: 0 15px 20px; }
        .news-card { background: white; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); border-right: 7px solid var(--red); padding: 20px; position: relative; }
        .news-badge { background: #fff1f1; color: var(--red); padding: 2px 10px; border-radius: 5px; font-size: 16px; font-weight: bold; float: left; }
        .news-date { color: #999; font-size: 17px; display: block; margin-bottom: 10px; }
        .news-title { font-size: 22px; color: var(--blue); line-height: 1.5; margin: 15px 0; font-weight: bold; text-align: justify; clear: both; }
        .read-more { color: var(--red); text-decoration: none; font-weight: bold; font-size: 19px; }

        /* سوشل ميڊيا سيڪشن */
        .social-section { text-align: center; padding: 25px 15px; background: white; margin: 20px 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .social-section h4 { margin: 0 0 15px; color: var(--blue); font-size: 22px; }
        .social-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .social-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; transition: 0.3s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .facebook { background: #1877F2; }
        .instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .youtube { background: #FF0000; }
        .whatsapp { background: #25D366; }
        .social-btn:hover { transform: translateY(-5px); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

        /* فلوٽنگ بٽڻ */
        .admin-fab { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 8px 20px rgba(13, 42, 74, 0.4); text-decoration: none; z-index: 1000; }

        .dev-tag { text-align: center; color: #bbb; font-size: 14px; padding: 20px 0 100px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>

    <script>
        // Supabase Setup
        const SB_URL = "https://dphtkbzfgiaxghommegd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaHRrYnpmZ2lheGdob21tZWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTA2MjMsImV4cCI6MjA5MDk4NjYyM30.GPHVERT8PzCwggjkwAQOLgYoSioSmSY0y8g3ZcrPHAU";
        const _client = supabase.createClient(SB_URL, SB_KEY);

        // Menu Toggle
        function toggleMenu(e) {
            e.stopPropagation();
            const m = document.getElementById('dropdown-menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }
        window.onclick = () => document.getElementById('dropdown-menu').style.display = 'none';

        // Load Announcements
        async function loadNews() {
            const list = document.getElementById('news-list');
            try {
                const { data, error } = await _client.from('announcements').select('*').order('created_at', {ascending: false}).limit(5);
                if(error) throw error;
                if(data && data.length > 0) {
                    list.innerHTML = "";
                    data.forEach(item => {
                        const d = new Date(item.created_at).toLocaleDateString('sd-PK', {year:'numeric', month:'long', day:'numeric'});
                        list.innerHTML += `
                            <div class="news-card">
                                <span class="news-badge">پڌرائي</span>
                                <span class="news-date">${d}</span>
                                <div class="news-title">${item.title}</div>
                                <a href="news-detail.html?id=${item.id}" class="read-more">وڌيڪ پڙهو...</a>
                            </div>
                        `;
                    });
                } else {
                    list.innerHTML = "<p style='text-align:center;'>ڪا به پڌرائي موجود ناهي.</p>";
                }
            } catch (err) {
                list.innerHTML = "<p style='text-align:center; color:red;'>ڊيٽا لوڊ ڪرڻ ۾ مسئلو آيو.</p>";
            }
        }
        loadNews();
    </script>
