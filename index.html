<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSSF JSQM PORTAL</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; text-align: center; }
        header { background: #e63946; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 20px; max-width: 600px; margin: auto; }
        .nav-btn { background: #1d3557; color: white; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .news-section { background: white; margin: 20px auto; padding: 15px; border-radius: 12px; border-right: 6px solid #e63946; max-width: 600px; }
        .news-card { border-bottom: 1px solid #eee; padding: 12px; text-align: right; }
        .news-card:last-child { border: none; }
    </style>
</head>
<body>
    <header>JSSF JSQM PORTAL</header>

    <div class="nav-menu">
        <a href="membership.html" class="nav-btn">ميمبرشپ فارم</a>
        <a href="library.html" class="nav-btn">ڊجيٽل لائبرري</a>
        <a href="gallery.html" class="nav-btn">فوٽو گيلري</a>
        <a href="admin.html" class="nav-btn" style="background:#457b9d;">ايڊمن ڪنٽرول</a>
    </div>

    <div class="news-section">
        <h3>تازا پڌرناما (Press Release)</h3>
        <div id="news-container">لوڊ ٿي رهيو آهي...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDTQkbwawj4Hxihxx3Z0hcwS3HhuNjXttw",
            databaseURL: "https://jssf-jsqm-portal-ed46c-default-rtdb.firebaseio.com",
            projectId: "jssf-jsqm-portal-ed46c",
            appId: "1:583976265356:web:d6753b8eb3a96aa5f83da9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'announcements'), (snapshot) => {
            const container = document.getElementById('news-container');
            container.innerHTML = "";
            const data = snapshot.val();
            if(data) {
                Object.values(data).reverse().forEach(news => {
                    container.innerHTML += `<div class="news-card"><strong>${news.title}</strong><p>${news.message}</p><small style="color:gray;">${news.date || ''}</small></div>`;
                });
            } else { container.innerHTML = "في الحال ڪو پڌرنامو ناهي."; }
        });
    </script>
</body>
</html>
