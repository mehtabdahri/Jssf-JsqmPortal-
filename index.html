<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>JSSF JSQM - Official Student Portal</title>
    <meta name="description" content="جيئي سنڌ اسٽوڊنٽس فيڊريشن (JSSF) ۽ JSQM جو سرڪاري پورٽل.">
    <meta name="keywords" content="JSSF, JSQM, Student Portal, Sindh">

    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Lateef&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --blue: #0d2a4a; --red: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Lateef', cursive; background: var(--bg); margin: 0; padding: 0; font-size: 20px; color: #333; overflow-x: hidden; }

        /* هيڊر اسٽائل */
        .header { background: var(--blue); padding: 40px 15px 75px; text-align: center; color: white; position: relative; }
        .logo-container { width: 95px; height: 95px; background: white; border-radius: 50%; margin: 0 auto 10px; padding: 5px; border: 3px solid var(--red); box-shadow: 0 4px 15px rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .header h1 { margin: 10px 0 0; font-size: 30px; font-weight: normal; }

        .search-icon { position: absolute; left: 20px; top: 45px; font-size: 22px; cursor: pointer; opacity: 0.8; }
        .menu-icon { position: absolute; right: 20px; top: 45px; font-size: 24px; cursor: pointer; z-index: 2001; }

        /* مينيو */
        #dropdown-menu { display: none; position: absolute; right: 20px; top: 85px; background: white; color: black; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); width: 170px; z-index: 2000; text-align: right; border: 1px solid #eee; }
        #dropdown-menu a { display: block; padding: 12px 15px; text-decoration: none; color: #333; border-bottom: 1px solid #f4f4f4; }

        /* گريڊ */
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 15px; margin-top: -45px; position: relative; z-index: 10; }
        .menu-item { background: white; border-radius: 15px; padding: 25px 5px; text-align: center; text-decoration: none; color: var(--blue); box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .menu-item i { font-size: 32px; color: var(--red); margin-bottom: 12px; display: block; }
        .menu-item span { font-weight: bold; }

        /* پڌرائيون */
        .section-header { padding: 30px 20px 10px; display: flex; justify-content: space-between; align-items: center; }
        .section-header h3 { border-right: 5px solid var(--red); padding-right: 12px; font-size: 26px; color: var(--blue); margin: 0; }
        .news-container { padding: 0 15px 20px; }
        .news-card { background: white; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.04); border-right: 7px solid var(--red); padding: 20px; }

        /* سوشل ميڊيا */
        .social-section { text-align: center; padding: 25px 15px; background: white; margin: 20px 15px; border-radius: 15px; }
        .social-links { display: flex; justify-content: center; gap: 12px; }
        .social-btn { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; }
        .facebook { background: #1877F2; } .instagram { background: #E4405F; } .youtube { background: #FF0000; } .whatsapp { background: #25D366; }

        .dev-tag { text-align: center; color: #bbb; font-size: 14px; padding: 20px 0 100px; }
        .admin-fab { position: fixed; bottom: 25px; left: 25px; width: 60px; height: 60px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-search search-icon"></i>
        <div class="logo-container">
            <img src="logo.png" alt="JSSF JSQM Logo">
        </div>
        <h1>جيئي سنڌ اسٽوڊنٽس فيڊريشن</h1>
        <i class="fas fa-ellipsis-v menu-icon" onclick="toggleMenu(event)"></i>
        
        <div id="dropdown-menu">
            <a href="about.html">اسان بابت</a>
            <a href="contact.html">رابطو ڪريو</a>
            <a href="admin.html">ايڊمن لاگ ان</a>
        </div>
    </div>

    <div class="menu-grid">
        <a href="body.html" class="menu-item"><i class="fas fa-users"></i><span>باڊي</span></a>
        <a href="gallery.html" class="menu-item"><i class="fas fa-images"></i><span>گيلري</span></a>
        <a href="library.html" class="menu-item"><i class="fas fa-book-open"></i><span>لائبرري</span></a>
        <a href="complaint.html" class="menu-item"><i class="fas fa-comment-dots"></i><span>شڪايت</span></a>
        <a href="membership.html" class="menu-item"><i class="fas fa-user-plus"></i><span>ميمبرشپ</span></a>
        <a href="manifesto.html" class="menu-item"><i class="fas fa-file-alt"></i><span>منشور</span></a>
    </div>

    <div class="section-header">
        <h3>تازيون پڌرائيون</h3>
        <a href="all-news.html" style="color:var(--red); text-decoration:none;">سڀ ڏسو</a>
    </div>

    <div class="news-container" id="news-list">
        <div style="text-align:center; padding:30px;">لوڊ ٿي رهيو آهي...</div>
    </div>

    <div class="social-section">
        <h4>اسان سان جڙيل رهو</h4>
        <div class="social-links">
            <a href="#" class="social-btn facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-btn instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn youtube"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-btn whatsapp"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>

    <div class="dev-tag">DEVELOPED BY MEHTAB KHAN</div>

    <a href="admin.html" class="admin-fab"><i class="fas fa-user-shield"></i></a>

    <script>
        const SB_URL = "https://dphtkbzfgiaxghommegd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."; // توهان جي ڪي
        const _client = supabase.createClient(SB_URL, SB_KEY);

        function toggleMenu(e) {
            e.stopPropagation();
            const m = document.getElementById('dropdown-menu');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }
        window.onclick = () => document.getElementById('dropdown-menu').style.display = 'none';

        async function loadNews() {
            const list = document.getElementById('news-list');
            const { data, error } = await _client.from('announcements').select('*').limit(5);
            if(data) {
                list.innerHTML = "";
                data.forEach(item => {
                    list.innerHTML += `<div class="news-card"><div class="news-title">${item.title}</div></div>`;
                });
            }
        }
        loadNews();
    </script>
</body>
</html>
