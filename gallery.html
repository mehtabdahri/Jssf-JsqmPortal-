<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSSF Gallery - جساف گيلري</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lateef&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d32f2f; --black: #1a1a1a; }
        body { font-family: 'Lateef', cursive; background: #111; margin: 0; color: white; font-size: 22px; }
        
        .header { background: var(--red); padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .header h1 { margin: 0; font-size: 35px; }

        .container { max-width: 1100px; margin: 20px auto; padding: 10px; }
        
        /* گيلري گريڊ */
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 15px; 
        }

        .gallery-item { 
            position: relative;
            border-radius: 10px; 
            overflow: hidden; 
            background: #222;
            cursor: pointer;
            height: 250px;
            transition: 0.3s;
            border: 2px solid #333;
        }

        .gallery-item:hover { transform: scale(1.02); border-color: var(--red); }

        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .img-caption {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 8px;
            font-size: 18px;
            text-align: center;
        }

        /* لائيٽ باڪس (تصوير وڏي ڪرڻ لاءِ) */
        #lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20000;
            justify-content: center; align-items: center;
            flex-direction: column;
        }

        #lightbox img { max-width: 90%; max-height: 80%; border-radius: 10px; }
        #lightbox-caption { margin-top: 15px; font-size: 25px; color: var(--red); }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; }

        .loading { text-align: center; padding: 50px; font-size: 25px; color: #888; }
        .back-btn { display: block; text-align: center; margin: 30px 0; color: var(--red); text-decoration: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-images"></i> جيئي سنڌ اسٽوڊنٽس فيڊريشن گيلري</h1>
    </div>

    <div class="container">
        <div id="gallery-list" class="gallery-grid">
            <div class="loading">تصويرون لوڊ ٿي رهيون آهن...</div>
        </div>

        <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> واپس مکيه صفحي تي وڃو</a>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-btn">&times;</span>
        <img id="lightbox-img" src="">
        <div id="lightbox-caption"></div>
    </div>

    <script>
        const SB_URL = "https://dphtkbzfgiaxghommegd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaHRrYnpmZ2lheGdob21tZWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTA2MjMsImV4cCI6MjA5MDk4NjYyM30.GPHVERT8PzCwggjkwAQOLgYoSioSmSY0y8g3ZcrPHAU";
        const _client = supabase.createClient(SB_URL, SB_KEY);

        async function fetchGallery() {
            const listDiv = document.getElementById('gallery-list');

            try {
                // announcements ٽيبل مان تصويرون کڻڻ
                const { data, error } = await _client
                    .from('announcements')
                    .select('*')
                    .not('image_url', 'is', null)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                listDiv.innerHTML = "";
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'gallery-item';
                    div.onclick = () => openLightbox(item.image_url, item.title);
                    div.innerHTML = `
                        <img src="${item.image_url}" alt="Gallery Image">
                        <div class="img-caption">${item.title}</div>
                    `;
                    listDiv.appendChild(div);
                });

            } catch (err) {
                listDiv.innerHTML = "<p>تصويرون لوڊ نه ٿي سگهيون.</p>";
            }
        }

        function openLightbox(url, title) {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-caption').innerText = title;
            document.getElementById('lightbox').style.display = "flex";
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = "none";
        }

        fetchGallery();
    </script>
</body>
</html>
