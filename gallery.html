<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSSF فوٽو گيلري</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; text-align: center; }
        header { background: #e63946; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; max-width: 1000px; margin: auto; }
        .gallery-item img { width: 100%; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; }
        .gallery-item img:hover { transform: scale(1.05); }
        .back-btn { display: inline-block; margin: 20px; color: #1d3557; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <header>JSSF فوٽو گيلري</header>
    <a href="index.html" class="back-btn">← واپس مين پيج</a>
    <div class="gallery-container" id="gallery-box">لوڊ ٿي رهيو آهي...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyDTQkbwawj4Hxihxx3Z0hcwS3HhuNjXttw",
            databaseURL: "https://jssf-jsqm-portal-ed46c-default-rtdb.firebaseio.com",
            projectId: "jssf-jsqm-portal-ed46c",
            appId: "1:583976265356:web:d6753b8eb3a96aa5f83da9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'gallery'), (snapshot) => {
            const box = document.getElementById('gallery-box');
            box.innerHTML = "";
            if(snapshot.exists()) {
                snapshot.forEach((child) => {
                    box.innerHTML += `<div class="gallery-item"><img src="${child.val().url}"></div>`;
                });
            } else { box.innerHTML = "في الحال ڪا تصوير موجود ناهي."; }
        });
    </script>
</body>
</html>
