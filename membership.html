<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميمبرشپ فارم</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; border-top: 6px solid #2a9d8f; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { background: #2a9d8f; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .back-link { display: block; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#1d3557;">ميمبرشپ فارم</h2>
        <input type="text" id="name" placeholder="مڪمل نالو">
        <input type="text" id="father" placeholder="پيءُ جو نالو">
        <input type="text" id="whatsapp" placeholder="واٽس اپ نمبر">
        <button id="saveBtn">پورٽل تي محفوظ ٿيو</button>
        <a href="index.html" class="back-link">← واپس مين پيج تي وڃو</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        const firebaseConfig = {
            apiKey: "AIzaSyDTQkbwawj4Hxihxx3Z0hcwS3HhuNjXttw",
            databaseURL: "https://jssf-jsqm-portal-ed46c-default-rtdb.firebaseio.com",
            projectId: "jssf-jsqm-portal-ed46c",
            appId: "1:583976265356:web:d6753b8eb3a96aa5f83da9"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('saveBtn').onclick = () => {
            const n = document.getElementById('name').value;
            const f = document.getElementById('father').value;
            const w = document.getElementById('whatsapp').value;
            if(n && w) {
                push(ref(db, 'members'), { fullName: n, fatherName: f, whatsapp: w, date: new Date().toLocaleString() })
                .then(() => { alert("رجسٽريشن ڪامياب!"); window.location.href="index.html"; });
            } else { alert("مهرباني ڪري نالو ۽ نمبر لکو."); }
        };
    </script>
</body>
</html>
