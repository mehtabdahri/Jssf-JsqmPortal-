<!DOCTYPE html>
<html lang="sd" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSSF Complaint Box - شڪايت باڪس</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lateef&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #d32f2f; --dark: #1a1a1a; }
        body { font-family: 'Lateef', cursive; background: #f0f2f5; margin: 0; padding: 20px; font-size: 22px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 6px solid var(--red); }
        h2 { color: var(--red); text-align: center; margin-bottom: 20px; font-size: 32px; }
        p { text-align: center; color: #555; margin-bottom: 20px; line-height: 1.4; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--dark); }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-family: 'Lateef'; font-size: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--red); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 24px; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--dark); }
        .back-link { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--red); font-size: 18px; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2><i class="fas fa-box-open"></i> مرڪز کي شڪايت موڪليو</h2>
        <p>توهان جي شڪايت سڌو مرڪزي قيادت تائين پهچندي. مهرباني ڪري پنهنجو صحيح رڪارڊ داخل ڪريو.</p>

        <label>پورو نالو:</label>
        <input type="text" id="user-name" placeholder="پنهنجو نالو لکو...">

        <label>فون يا واٽس اپ نمبر:</label>
        <input type="number" id="user-phone" placeholder="03xxxxxxxxx">

        <label>يونٽ / شهر:</label>
        <input type="text" id="user-unit" placeholder="پنهنجو يونٽ لکو...">

        <label>شڪايت جو تفصيل:</label>
        <textarea id="user-msg" rows="5" placeholder="هتي پنهنجو مسئلو يا شڪايت لکو..."></textarea>

        <button onclick="sendComplaint()">شڪايت جمع ڪريو</button>
        
        <div id="status-msg"></div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> واپس مکيه صفحي تي وڃو</a>
    </div>

    <script>
        const SB_URL = "https://dphtkbzfgiaxghommegd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwaHRrYnpmZ2lheGdob21tZWdkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU0MTA2MjMsImV4cCI6MjA5MDk4NjYyM30.GPHVERT8PzCwggjkwAQOLgYoSioSmSY0y8g3ZcrPHAU";
        const _client = supabase.createClient(SB_URL, SB_KEY);

        async function sendComplaint() {
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            const unit = document.getElementById('user-unit').value;
            const msg = document.getElementById('user-msg').value;
            const status = document.getElementById('status-msg');

            if(!name || !phone || !msg) {
                status.style.color = "red";
                status.innerText = "مهرباني ڪري پنهنجو نالو، نمبر ۽ شڪايت لکو!";
                return;
            }

            status.style.color = "blue";
            status.innerText = "موڪلي رهيو آهي...";

            try {
                const { error } = await _client
                    .from('complaints')
                    .insert([{ full_name: name, phone: phone, unit: unit, message: msg }]);

                if(error) throw error;

                status.style.color = "green";
                status.innerText = "توهان جي شڪايت ڪاميابيءَ سان جمع ٿي وئي آهي!";
                
                // فارم خالي ڪرڻ
                document.getElementById('user-name').value = "";
                document.getElementById('user-phone').value = "";
                document.getElementById('user-unit').value = "";
                document.getElementById('user-msg').value = "";

            } catch (err) {
                status.style.color = "red";
                status.innerText = "غلطي: " + err.message;
            }
        }
    </script>
    <link rel="manifest" href="manifest.json">
</body>
</html>
